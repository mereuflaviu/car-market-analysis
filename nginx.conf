server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "DENY"                             always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self';
         script-src 'self';
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src 'self' https://fonts.gstatic.com;
         img-src 'self' data: blob:;
         connect-src 'self';
         object-src 'none';
         base-uri 'self';
         form-action 'self';"
        always;

    # ── Proxy /api/* to the backend service ──────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # Don't expose backend server header
        proxy_hide_header  Server;
        proxy_hide_header  X-Powered-By;
    }

    # ── Health probe ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend:8001/health;
        proxy_hide_header Server;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|woff2|svg|png|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-apply security headers (add_header doesn't inherit into nested blocks)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "DENY"    always;
    }

    # ── Hide nginx version ────────────────────────────────────────────────────
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
