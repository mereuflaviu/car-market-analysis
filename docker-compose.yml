services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: backend/.env
    environment:
      DB_PATH: /app/dbdata/cars.db
      SCRAPER_DIR: /model/extraction
    volumes:
      - ./backend:/app/dbdata
      - ./backend/artifacts:/app/artifacts
      - ./model:/model
    ports:
      - "8001:8001"        # expose directly for local dev; remove in prod (use nginx)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
        VITE_API_KEY: ${VITE_API_KEY:-}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
