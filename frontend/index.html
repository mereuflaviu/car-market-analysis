<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoScope — Buy smart. Sell smart.</title>

    <!-- SEO -->
    <meta name="description" content="AutoScope estimează prețul corect al oricărei mașini second-hand din România. Model XGBoost antrenat pe 5.444 anunțuri reale. R²=0.93." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AutoScope — Buy smart. Sell smart." />
    <meta property="og:description" content="Estimează prețul corect al mașinii tale. Model AI antrenat pe 5.444 anunțuri din România." />
    <meta property="og:locale" content="ro_RO" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AutoScope — Buy smart. Sell smart." />
    <meta name="twitter:description" content="Estimează prețul corect al mașinii tale." />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />

    <!-- Favicon (inline SVG) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Anti-flash: apply saved theme before first paint -->
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = t === 'dark' || (!t && prefersDark) || (t === 'system' && prefersDark);
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.colorScheme = 'light';
          document.documentElement.style.backgroundColor = '#ffffff';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
